<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <!-- 主页面 -->
        <div id="mainMenu" class="menu">
            <h1>demo</h1>
            <div class="main-menu-buttons">
                <button id="startBtn" class="menu-btn">开始游戏</button>
                <button id="settingsBtn" class="menu-btn">设置</button>
                <button id="levelSelectBtn" class="menu-btn">关卡选择</button>
            </div>
        </div>
        
        <!-- 设置页面 -->
        <div id="settings" class="menu">
            <h2>设置</h2>
            <div class="menu-buttons">
                <button id="backFromSettingsBtn" class="menu-btn">返回</button>
            </div>
        </div>
        
        <!-- 关卡选择界面 -->
        <div id="levelSelect" class="menu">
            <h2>选择关卡</h2>
            <div class="level-buttons">
                <button id="level1Btn" class="level-btn">关卡 1</button>
                <button id="level2Btn" class="level-btn">关卡 2</button>
                <button id="level3Btn" class="level-btn">关卡 3</button>
            </div>
        </div>
        
        <!-- 通关提示界面 -->
        <div id="levelComplete" class="menu">
            <h2>关卡完成！</h2>
            <div class="menu-buttons">
                <button id="playAgainBtn" class="menu-btn">再玩一次</button>
                <button id="nextLevelBtn" class="menu-btn">下一关</button>
                <button id="backToMainBtn" class="menu-btn">主页面</button>
            </div>
        </div>
        
        <!-- 游戏结束界面 -->
        <div id="gameOver" class="menu">
            <h2>游戏结束！</h2>
            <div class="menu-buttons">
                <button id="tryAgainBtn" class="menu-btn">再来一次</button>
                <button id="backToMainFromGameOverBtn" class="menu-btn">返回主页</button>
            </div>
        </div>
        
        <!-- 游戏界面 -->
        <canvas id="gameCanvas" width="360" height="640"></canvas>
        <div class="controls">
            <button id="leftBtn">←</button>
            <button id="rightBtn">→</button>
            <button id="menuBtn">菜单</button>
        </div>
    </div>
    <script src="src/levels/level1.js"></script>
    <script src="src/levels/level2.js"></script>
    <script src="src/levels/level3.js"></script>
    <script src="src/obstacles.js"></script>
    <script src="script.js"></script>
</body>
</html>
